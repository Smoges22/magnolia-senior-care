      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Adult Family Homes may support medication routines within applicable licensing rules and resident care needs. Families should ask each home how medication support is handled."
      }
    },
    {
      "@type": "Question",
      "name": "What should families bring to a tour?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Bring a current medication list, pharmacy information, recent discharge papers if available, allergies, diagnoses, and contact information for the prescribing clinicians."
      }
    },
    {
      "@type": "Question",
      "name": "What if medication changes after a hospital stay?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Ask the discharge team for written instructions and confirm how the new list will be communicated to the pharmacy, care home, physician, family, and POA."
      }
    },
    {
      "@type": "Question",
      "name": "Can Magnolia give medication advice?",
      "acceptedAnswer": {
        "@type": "Answer",
