    {
      "@type": "Question",
      "name": "Can the hospital force a family to choose the first available placement?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Families should ask the discharge planner or social worker to explain the discharge process, timeline, and options. Specific rights or appeals questions should be discussed with the hospital and qualified advocates or professionals."
      }
    },
    {
      "@type": "Question",
      "name": "What should I say when calling an Adult Family Home?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Share the discharge timeline, care needs, medication routine, mobility status, memory concerns, location preference, payment source if known, and best family or POA contact."
      }
    },
    {
      "@type": "Question",
      "name": "What if my parent wants to go home but the team says it is unsafe?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Ask what specific risks they see, what support would be needed at home, and what alternatives may be appropriate. A physician, discharge planner, therapist, or care manager may help explain options."
      }
    },
    {
      "@type": "Question",
      "name": "Can Magnolia respond to urgent discharge needs?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Magnolia can discuss availability and care fit. A quick response is easier when families provide care details, documents, timeline, location preference, and decision-maker contacts."
      }
    }
