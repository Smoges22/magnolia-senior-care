      "name": "Does needing 24/7 care mean my loved one needs a nursing home?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Not always. Some people may need skilled nursing, while others may be appropriate for an Adult Family Home, assisted living, memory care, or another setting. Fit depends on care needs and provider capability."
      }
    },
    {
      "@type": "Question",
      "name": "What if my loved one refuses care?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Resistance is common. Families may need support from physicians, trusted relatives, care managers, or discharge planners. Calm, repeated conversations often work better than pressure."
      }
    },
    {
      "@type": "Question",
      "name": "Can 24/7 care reduce hospital visits?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No care setting can guarantee outcomes, but consistent supervision, medication routines, fall-risk awareness, and communication may help families respond earlier to concerns."
      }
    },
