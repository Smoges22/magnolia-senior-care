      "@type": "Question",
      "name": "Is caregiver burnout normal?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Caregiver stress is common, especially when needs increase over time. Burnout should still be taken seriously because it can affect health, relationships, and care safety."
      }
    },
    {
      "@type": "Question",
      "name": "Does asking for help mean I failed?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. Asking for help can be an act of protection for both the caregiver and the person receiving care."
      }
    },
    {
      "@type": "Question",
      "name": "What support options can families consider?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Depending on needs, families may consider family help, respite, home care, Adult Family Home care, assisted living, memory care, hospice, or skilled nursing."
      }
    },
    {
      "@type": "Question",
      "name": "When should a caregiver seek urgent help?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Seek urgent help if anyone is unsafe, the caregiver feels unable to continue safely, there are repeated falls, severe confusion, wandering, or a medical emergency."
      }
    }
