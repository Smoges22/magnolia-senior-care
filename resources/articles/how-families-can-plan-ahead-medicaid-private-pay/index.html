        "@type": "Answer",
        "text": "No. Medicaid-related support depends on eligibility, assessment, authorization, provider participation, availability, and official review. Families should confirm details with qualified sources."
      }
    },

      "@type": "Question",
      "name": "What documents should families organize?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Families may organize POA documents, medication lists, diagnoses, discharge papers, care notes, income and asset summaries, insurance cards, and family contact information."
      }
    },
    {
      "@type": "Question",
      "name": "Does Magnolia promise Medicaid placement?",
      "acceptedAnswer": {
        "@type": "Answer",

      }

      "@type": "Question",
      "name": "Why doesn't Magnolia list exact private-pay rates online?",
      "acceptedAnswer": {
        "@type": "Answer",
