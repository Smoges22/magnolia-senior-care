      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. Routines do not cure dementia or guarantee behavior changes. They may help some people feel safer and less overwhelmed as part of a broader care plan."
      }
    },
    {
      "@type": "Question",
      "name": "What routines help most?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Consistent meals, hydration, sleep, bathing, medication timing, familiar caregivers, calm communication, and lower stimulation may help some residents."
      }
    },
    {
      "@type": "Question",
      "name": "When should families call a doctor?",
      "acceptedAnswer": {
        "@type": "Answer",

      }
