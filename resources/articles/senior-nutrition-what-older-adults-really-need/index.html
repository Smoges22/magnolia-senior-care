      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Watch for weight loss, poor appetite, dehydration signs, coughing during meals, choking, pocketing food, confusion, weakness, constipation, and changes after medication or illness."

      "name": "Can Magnolia create a medical diet plan?",

      "@type": "Question",
      "name": "Why is hydration important for seniors?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Hydration can affect strength, alertness, constipation, urinary health, dizziness, and fall risk. Families should ask how hydration is encouraged and monitored."
      }
    },
    {
      "@type": "Question",
      "name": "How does dementia affect eating?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Dementia may affect appetite, attention, food recognition, swallowing safety, meal timing, and willingness to accept help. Calm routines and familiar foods may support some residents."
      }
