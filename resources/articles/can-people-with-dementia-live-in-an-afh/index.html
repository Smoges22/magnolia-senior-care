    {
      "@type": "Question",
      "name": "Can every Adult Family Home care for dementia?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. Some Adult Family Homes may support dementia care, but each home has different experience, staffing, environment, and care limits. Families should ask specific questions."
      }
    },
    {
      "@type": "Question",
      "name": "Can an AFH stop wandering or dementia behaviors?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No setting can guarantee that wandering, confusion, or behaviors will not occur. Families should ask how the home observes, redirects, communicates, and responds to safety concerns."
      }
    },
    {
      "@type": "Question",
      "name": "What questions should I ask about dementia care?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Ask about routines, supervision, wandering risk, nighttime safety, medication routines, caregiver experience, communication, meals, hydration, mobility, and when the home would recommend another level of care."
      }
    },
    {
      "@type": "Question",
      "name": "When is memory care better than an AFH?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Memory care or another setting may be more appropriate when supervision needs, elopement risk, behaviors, or medical complexity exceed what an Adult Family Home can safely support."
      }
    }
