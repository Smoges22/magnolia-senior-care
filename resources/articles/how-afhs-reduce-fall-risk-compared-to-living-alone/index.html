      "name": "What should families ask after a fall?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Ask what happened, whether medical evaluation was needed, what injuries were found, what changes are being made, and how future concerns will be communicated."
      }
    },

      "@type": "Question",
      "name": "Are medications related to fall risk?",
      "acceptedAnswer": {
        "@type": "Answer",

      }

      "@type": "Question",
      "name": "When should fall risk lead to 24/7 care?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Families may consider 24/7 care when falls repeat, the person cannot transfer safely, nighttime safety is poor, or living alone no longer feels realistic."
