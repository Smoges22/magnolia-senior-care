        "@type": "Answer",
        "text": "No. Dementia diagnosis should come from a physician or qualified clinician. Magnolia can discuss care needs, safety concerns, routines, and whether a residential care setting may fit."
      }

    {
      "@type": "Question",
      "name": "What changes should families track?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Track falls, wandering, missed medications, nutrition, hygiene, sleep changes, confusion, behavior changes, caregiver stress, and examples of unsafe decisions."
      }
    },
    {
      "@type": "Question",
      "name": "When is 24/7 care worth considering?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Families may consider 24/7 care when safety, supervision, medication routines, mobility, or caregiver burnout become difficult to manage."
      }
    },
    {
      "@type": "Question",
      "name": "Can a calm home setting help someone with dementia?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Some residents with memory changes benefit from consistent routines, fewer transitions, familiar caregivers, and a quieter setting. Fit depends on the person's needs and the home's ability to support them safely."
      }
