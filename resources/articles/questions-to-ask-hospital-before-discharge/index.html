    {
      "@type": "Question",
      "name": "What documents should we request before discharge?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Ask for the discharge summary, current medication list, diagnosis list, therapy notes, diet instructions, wound care orders, equipment recommendations, follow-up appointments, and contact information."
      }
    },
    {
      "@type": "Question",
      "name": "What should we ask about supervision?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Ask whether the person can safely be alone, transfer alone, toilet alone, take medications independently, prepare meals, respond to emergencies, and sleep safely overnight."
      }
    },
    {
      "@type": "Question",
      "name": "Who helps decide where someone should go after discharge?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The hospital physician, nurses, therapists, social worker, discharge planner, family or POA, and sometimes outside care professionals may all be involved. Legal or rights questions should be directed to qualified professionals."
      }
    },
    {
      "@type": "Question",
      "name": "Can Magnolia help with discharge planning?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Magnolia can discuss care fit, availability, and what information is helpful when comparing Adult Family Home options. Families should contact Magnolia directly with discharge details."
      }
    }
  ]
