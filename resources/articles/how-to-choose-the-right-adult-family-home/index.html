  "mainEntity": [
    {
      "@type": "Question",
      "name": "What should I ask when touring an Adult Family Home?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Ask about licensing, staffing, RN oversight, medication routines, fall-risk awareness, dementia experience, meals, room setup, communication, hospice coordination, and what would happen if care needs increase."
      }
    },
    {
      "@type": "Question",
      "name": "How do I know if an Adult Family Home is a good fit?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A good fit depends on whether the home can support the resident's care needs safely, communicate clearly, provide a calm environment, and explain its approach without pressure or vague promises."
      }
    },
    {
      "@type": "Question",
      "name": "Should I bring medical information to a tour?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. A medication list, diagnoses, mobility details, hospital discharge notes, diet instructions, and family or POA contact information can help the home discuss care fit more accurately."
      }
    },
    {
      "@type": "Question",
      "name": "Can Magnolia guarantee placement?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. Placement depends on care fit, assessment details, room availability, and whether Magnolia can safely meet the resident's needs. Families should contact Magnolia directly to discuss current options."
      }
    }
  ]
